basePath: /api/v1
definitions:
  auth.ForgotPasswordOption:
    properties:
      code:
        description: auth code get from user binding email
        example: F294484D
        type: string
      password:
        description: length of the password must be in range [10,30]
        example: "123456789"
        type: string
    type: object
  auth.LoginOption:
    properties:
      password:
        description: length of the password must be in range [10,30]
        example: "123456789"
        type: string
      username:
        description: length of the username must be in range [6,20], and username
          must be Alphanumeric
        example: 123456@example.com/username
        type: string
    type: object
  auth.PingReply:
    properties:
      reply:
        example: hello wendy! Now is 2023-10-17 11:07:21.696 +08:00.
        type: string
    type: object
  auth.RegisterOption:
    properties:
      code:
        description: 8-digit auth code get from user binding email, and it must be
          Alphanumeric
        example: F294484D
        type: string
      password:
        description: length of the password must be in range [10,30]
        example: "123456789"
        type: string
      username:
        description: length of the username must be in range [6,20], and username
          must be Alphanumeric
        example: 123456@example.com/username
        type: string
    type: object
  auth.Token:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJVc2VybmFtZSI6InN0cmFuZ2VyIiwidXNlcklkIjoiMDA1YjQzOTctOTRjMi00YWZjLWIzNTEtNWIzY2VkNzI4MDkzIiwiaXNzIjoid2lsc29uIiwiZXhwIjoxNjk3MzI0ODY4LCJpYXQiOjE2OTcyODg4NjgsImp0aSI6IjdkZDI4NDZlLTFkZjEtNDBkMS04YmZlLTA3ZGI3ZmE4NmFhYiJ9.HnAaz-WOmugqfdz_oXphsJY_zQl3FCzrtYCm90WJgGU
        type: string
    type: object
  role.CreatePermOption:
    properties:
      action:
        description: how to access the object
        example: POST
        type: string
      group:
        description: permission group
        example: UserGroup
        type: string
      name:
        example: updateUser
        type: string
      object:
        description: define the object will be accessed
        example: /user/update
        type: string
      tag:
        description: tag of permission
        example: AppAPI
        type: string
    type: object
  role.CreateRoleOption:
    properties:
      code:
        description: role code, must be alpha numeric
        example: ADMIN
        type: string
      name:
        description: role name
        example: admin
        type: string
    type: object
  role.GrantOption:
    properties:
      permId:
        items:
          type: integer
        type: array
      roleId:
        example: 1
        type: integer
      tag:
        example: AppApi
        type: string
    type: object
  role.PermGroup:
    properties:
      group:
        description: group name
        example: user group
        type: string
      perms:
        items:
          $ref: '#/definitions/role.PermInfo'
        type: array
    type: object
  role.PermInfo:
    properties:
      action:
        description: how to access the object
        example: POST
        type: string
      group:
        description: permission group
        example: admin
        type: string
      id:
        description: permission id
        example: 1
        type: integer
      name:
        description: permission name
        example: updateUser
        type: string
      object:
        description: define the object will be accessed
        example: /user/update
        type: string
      tag:
        description: tag of permissions
        example: AppAPI
        type: string
    type: object
  role.RoleInfo:
    properties:
      code:
        description: role code, must be alpha numeric
        example: ADMIN
        type: string
      id:
        description: role id
        example: 1
        type: integer
      name:
        description: role name
        example: admin
        type: string
    type: object
  role.UpdatePermOption:
    properties:
      id:
        example: 1
        type: integer
      name:
        example: updateUser
        type: string
    type: object
  role.UpdateRoleOption:
    properties:
      id:
        example: 1
        type: integer
      name:
        description: role name
        example: admin
        type: string
    type: object
  types.Response:
    properties:
      code:
        example: 2000
        type: integer
      data: {}
      err:
        type: string
      msg:
        example: operation success
        type: string
    type: object
  user.CreateUserOption:
    properties:
      email:
        description: new email
        example: jack@google.com
        type: string
      password:
        description: new password
        example: "123456"
        type: string
      roles:
        description: new roles
        items:
          type: string
        type: array
      username:
        description: new username
        example: jack
        type: string
    type: object
  user.Info:
    properties:
      createdAt:
        example: 947416200
        type: integer
      email:
        example: jacklove@lol.com
        type: string
      roles:
        items:
          $ref: '#/definitions/role.RoleInfo'
        type: array
      username:
        example: jack
        type: string
      uuid:
        example: 55BBA4ED-18D3-790F-EABF-A5330E527586
        type: string
    type: object
  user.SaveUserDetailOption:
    properties:
      email:
        description: new email
        example: jack@google.com
        type: string
      password:
        description: new password
        example: "123456"
        type: string
      roles:
        description: new roles
        items:
          type: string
        type: array
      username:
        description: new username
        example: jack
        type: string
      uuid:
        example: 55BBA4ED-18D3-790F-EABF-A5330E527586
        type: string
    type: object
  user.UpdateInfoOption:
    properties:
      email:
        description: new email
        example: jack@google.com
        type: string
      password:
        description: new password
        example: "123456"
        type: string
      username:
        description: new username
        example: jack
        type: string
    type: object
info:
  contact:
    name: dstgo
    url: https://github.com/dstgo
  description: |-
    Wilson app http api documentation, use the Bearer Token to authenticate
    It should be noted that when using swagger doc for API debugging, the Token needs to be manually prefixed with Bearer.
  license:
    name: MIT LICENSE
    url: https://mit-license.org/
  title: Wilson App Internal API Documentation
  version: v1.0.0
paths:
  /auth/forgotpwd:
    post:
      consumes:
      - application/json
      description: |-
        [guest]
        forgot password
      parameters:
      - description: Account ID
        in: body
        name: form
        required: true
        schema:
          $ref: '#/definitions/auth.ForgotPasswordOption'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/types.Response'
      summary: ForgotPassword
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: |-
        [guest]
        if login success, return jwt token
      parameters:
      - description: comment
        in: body
        name: loginBody
        required: true
        schema:
          $ref: '#/definitions/auth.LoginOption'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/types.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.Token'
              type: object
      summary: Login
      tags:
      - auth
  /auth/logout:
    delete:
      consumes:
      - application/json
      description: |-
        [user]
        user logout
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/types.Response'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: |-
        [guest]
