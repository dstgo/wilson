basePath: /api
definitions:
  api.Response:
    properties:
      code:
        example: 2000
        type: integer
      data: {}
      err:
        type: string
      msg:
        example: operation success
        type: string
    type: object
  auth.ForgotPasswordOption:
    properties:
      code:
        description: auth code get from user binding email
        example: F294484D
        type: string
      password:
        description: length of the password must be in range [10,30]
        example: "123456789"
        type: string
    type: object
  auth.LoginOption:
    properties:
      password:
        description: length of the password must be in range [10,30]
        example: "123456789"
        type: string
      username:
        description: length of the username must be in range [6,20], and username
          must be Alphanumeric
        example: 123456@example.com/username
        type: string
    type: object
  auth.PingReply:
    properties:
      reply:
        example: hello wendy! Now is 2023-10-17 11:07:21.696 +08:00.
        type: string
    type: object
  auth.RegisterOption:
    properties:
      code:
        description: 8-digit auth code get from user binding email, and it must be
          Alphanumeric
        example: F294484D
        type: string
      password:
        description: length of the password must be in range [10,30]
        example: "123456789"
        type: string
      username:
        description: length of the username must be in range [6,20], and username
          must be Alphanumeric
        example: 123456@example.com/username
        type: string
    type: object
  auth.Token:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJVc2VybmFtZSI6InN0cmFuZ2VyIiwidXNlcklkIjoiMDA1YjQzOTctOTRjMi00YWZjLWIzNTEtNWIzY2VkNzI4MDkzIiwiaXNzIjoid2lsc29uIiwiZXhwIjoxNjk3MzI0ODY4LCJpYXQiOjE2OTcyODg4NjgsImp0aSI6IjdkZDI4NDZlLTFkZjEtNDBkMS04YmZlLTA3ZGI3ZmE4NmFhYiJ9.HnAaz-WOmugqfdz_oXphsJY_zQl3FCzrtYCm90WJgGU
        type: string
    type: object
  user.Info:
    properties:
      createdAt:
        example: "2022-01-01 00:00:00"
        type: string
      email:
        example: jacklove@lol.com
        type: string
      id:
        example: 1
        type: integer
      username:
        example: jack
        type: string
      uuid:
        example: 55BBA4ED-18D3-790F-EABF-A5330E527586
        type: string
    type: object
  user.PageOption:
    properties:
      desc:
        description: if is reverse order
        example: true
        type: boolean
      order:
        description: specified field
        example: email
        type: string
      page:
        description: page
        example: 1
        type: integer
      search:
        description: search text, should be of one username or email
        example: jacklove
        type: string
      size:
        description: size of page
        example: 10
        type: integer
    type: object
  user.UpdateInfoOption:
    properties:
      email:
        description: new email
        example: jack@google.com
        type: string
      id:
        description: specified user id
        example: 1
        type: integer
      password:
        description: new password
        example: "123456"
        type: string
      username:
        description: new username
        example: jack
        type: string
    type: object
info:
  contact: {}
  description: Wilson api documentation
  license:
    name: MIT
    url: https://mit-license.org/
  title: Wilson App Internal API Documentation
  version: v1.0.0
paths:
  /auth/forgotpwd:
    post:
      consumes:
      - application/json
      description: forgot password
      parameters:
      - description: Account ID
        in: body
        name: form
        required: true
        schema:
          $ref: '#/definitions/auth.ForgotPasswordOption'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
      summary: ForgotPassword
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: if login success, return jwt token
      parameters:
      - description: comment
        in: body
        name: loginBody
        required: true
        schema:
          $ref: '#/definitions/auth.LoginOption'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.Token'
              type: object
      summary: Login
      tags:
      - auth
  /auth/logout:
    delete:
      consumes:
      - application/json
      description: user logout
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
      summary: Logout
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: user register api
      parameters:
      - description: comment
        in: body
        name: registerBody
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterOption'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
      summary: Register
      tags:
      - auth
  /email/code:
    get:
      consumes:
      - application/json
      description: auth code email api
      parameters:
      - description: email
        in: query
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
      summary: SendCodeEmail
      tags:
      - email
  /ping:
    get:
      consumes:
      - application/json
      description: test app api if is ok
      parameters:
      - description: ping name
        in: query
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.PingReply'
              type: object
      summary: Ping
      tags:
      - system
  /role/create:
    post:
      consumes:
      - application/json
      description: create a new role
      produces:
      - application/json
      responses: {}
      summary: NewRole
      tags:
      - role
  /role/grant:
    post:
      consumes:
      - application/json
      description: grant permissions for the specified role
      produces:
      - application/json
      responses: {}
      summary: GrantPermForRole
      tags:
      - role
  /role/perm/create:
    post:
      consumes:
      - application/json
      description: create a new permission
      produces:
      - application/json
      responses: {}
      summary: NewPermission
      tags:
      - role
  /role/perm/remove:
    delete:
      consumes:
      - application/json
      description: remove the specified permission
      produces:
      - application/json
      responses: {}
      summary: RemovePermission
      tags:
      - role
  /role/perm/update:
    post:
      consumes:
      - application/json
      description: update the specified permission info
      produces:
      - application/json
      responses: {}
      summary: UpdatePermission
      tags:
      - role
  /role/remove:
    delete:
      consumes:
      - application/json
      description: remove a role
      produces:
      - application/json
      responses: {}
      summary: RemoveRole
      tags:
      - role
  /role/update:
    post:
      consumes:
      - application/json
      description: update the specified role info
      produces:
      - application/json
      responses: {}
      summary: UpdateRole
      tags:
      - role
  /user/info:
    get:
      consumes:
      - application/json
      description: get specific user simple info
      parameters:
      - description: userId
        in: query
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.Response'
            - properties:
                data:
                  $ref: '#/definitions/user.Info'
              type: object
      summary: GetUserInfo
      tags:
      - user
  /user/list:
    get:
      consumes:
      - application/json
      description: get specific user list
      parameters:
      - description: comment
        in: body
        name: userPageOptIon
        required: true
        schema:
          $ref: '#/definitions/user.PageOption'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/user.Info'
                  type: array
              type: object
      summary: GetUserInfoList
      tags:
      - user
  /user/remove:
    delete:
      consumes:
      - application/json
      description: Remove the specific user
      parameters:
      - description: userId
        in: query
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
      summary: RemoveUser
      tags:
      - user
  /user/update:
    post:
      consumes:
      - application/json
      description: update the specific user info
      parameters:
      - description: comment
        in: body
        name: updateInfoOption
        required: true
        schema:
          $ref: '#/definitions/user.UpdateInfoOption'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
      summary: UpdateUserInfo
      tags:
      - user
swagger: "2.0"
